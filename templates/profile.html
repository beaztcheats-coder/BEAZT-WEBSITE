{% extends "base.html" %}
{% block title %}Profile | BEAZT{% endblock %}

{% block content %}
<section class="page-section">
  <div class="container">
    <div class="page-header reveal" style="max-width:520px;margin-inline:auto;">
      <span class="section-eyebrow">Account</span>
      <h1 class="t-h1">Profile</h1>
    </div>

    <div style="max-width:520px;margin-inline:auto;">
      <form method="POST" class="reveal" style="display:flex;flex-direction:column;gap:1.25rem;">

        <div style="display:flex;flex-direction:column;gap:0.3rem;">
          <label style="font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;">Email</label>
          <input type="email" name="email" value="{{ current_user.email }}" required style="padding:0.65rem 0.85rem;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:0.88rem;outline:none;">
        </div>

        <div class="card" style="display:flex;flex-direction:column;gap:0.75rem;">
          <h3 style="font-size:0.85rem;font-weight:600;margin-bottom:0;">Change Password</h3>

          <div style="display:flex;flex-direction:column;gap:0.3rem;">
            <label style="font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;">Current Password</label>
            <input type="password" name="current_password" placeholder="Enter current password" style="padding:0.65rem 0.85rem;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:0.88rem;outline:none;">
          </div>

          <div style="display:flex;flex-direction:column;gap:0.3rem;">
            <label style="font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;">New Password</label>
            <input type="password" name="new_password" placeholder="6+ characters" style="padding:0.65rem 0.85rem;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:0.88rem;outline:none;">
          </div>

          <div style="display:flex;flex-direction:column;gap:0.3rem;">
            <label style="font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;">Confirm New Password</label>
            <input type="password" name="confirm_password" placeholder="Re-enter new password" style="padding:0.65rem 0.85rem;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:0.88rem;outline:none;">
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block">
          <span class="icon" data-lucide="save"></span> Save Changes
        </button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
