{% extends "base.html" %}
{% block title %}BEAZT - Create Operator{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="container auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="prompt">Join the node</div>
        <h1 class="t-h1">Create Account</h1>
        <p class="text-muted">Access premium tools and instant key delivery.</p>
        <div class="auth-benefits">
          <span class="chip">Instant delivery</span>
          <span class="chip">Legit presets</span>
          <span class="chip">Private Discord</span>
        </div>
      </div>
      <form method="POST" class="auth-form">
        <div class="form-group">
          <label for="username"><span class="icon icon-sm" data-lucide="user"></span> Username</label>
          <input type="text" id="username" name="username" required autocomplete="username" placeholder="choose_username" minlength="3">
        </div>
        <div class="form-group">
          <label for="email"><span class="icon icon-sm" data-lucide="mail"></span> Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password"><span class="icon icon-sm" data-lucide="lock"></span> Password</label>
          <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="min 8 characters" minlength="8">
        </div>
        <div class="form-group">
          <label for="confirm_password"><span class="icon icon-sm" data-lucide="unlock"></span> Confirm Password</label>
          <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password" placeholder="re-enter password">
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-full">
          <span class="icon" data-lucide="user-plus"></span> Create account
        </button>
      </form>
      <div class="auth-footer">
        <p>Already registered? <a href="{{ url_for('auth.login') }}">Sign in &rarr;</a></p>
      </div>
    </div>
  </div>
</section>
{% endblock %}
