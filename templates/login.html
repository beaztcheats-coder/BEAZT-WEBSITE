{% extends "base.html" %}
{% block title %}BEAZT - Operator Login{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="container auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="prompt">Terminal reconnect</div>
        <h1 class="t-h1">Sign In</h1>
        <p class="text-muted">Access your keys and manage your licenses.</p>
      </div>
      <form method="POST" class="auth-form">
        <div class="form-group">
          <label for="username"><span class="icon icon-sm" data-lucide="user"></span> Username</label>
          <input type="text" id="username" name="username" required autocomplete="username" placeholder="your_username">
        </div>
        <div class="form-group">
          <label for="password"><span class="icon icon-sm" data-lucide="lock"></span> Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
        </div>
        <div class="form-group form-row">
          <label class="checkbox-label"><input type="checkbox" name="remember"> Remember me</label>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-full">
          <span class="icon" data-lucide="log-in"></span> Sign in
        </button>
      </form>
      <div class="auth-footer">
        <p>No account? <a href="{{ url_for('auth.signup') }}">Create one &rarr;</a></p>
      </div>
    </div>
  </div>
</section>
{% endblock %}
